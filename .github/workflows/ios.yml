name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

jobs:
  build-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/VerticalLog
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project VerticalLog.xcodeproj \
            -scheme VerticalLog \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild test \
            -project VerticalLog.xcodeproj \
            -scheme VerticalLog \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO | xcpretty --test || exit ${PIPESTATUS[0]}
